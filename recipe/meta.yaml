{% set name = "scyjava" %}
{% set version = "1.12.5" %}
{% set build_number = 0 %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: b68280398be2306f07b9353ac25fc0b3af3c69b3645f7a7c565019b39df7b683

build:
  number: {{ build_number }}
  script: {{ PYTHON }} -m pip install . -vvv --no-deps
  noarch: python

requirements:
  host:
    - python {{ python_min }}
    - pip
    - jpype1 >=1.3.0
    - jgo >=2.1.0
    - setuptools >=77.0.0
  run:
    - python >={{ python_min }}
    - jpype1 >=1.3.0
    - jgo >=2.1.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - scyjava

about:
  home: https://github.com/scijava/scyjava
  license: Unlicense
  license_family: PUBLIC-DOMAIN
  summary: Supercharged Java access from Python.
  doc_url: https://github.com/scijava/scyjava
  dev_url: https://github.com/scijava/scyjava

extra:
  recipe-maintainers:
    - ctrueden
    - elevans
    - hinerm
    - hanslovsky
